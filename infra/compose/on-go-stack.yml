services:
  postgres:
    image: postgres:16-alpine
    container_name: on-go-postgres
    environment:
      POSTGRES_DB: on_go
      POSTGRES_USER: on_go
      POSTGRES_PASSWORD: on_go
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U on_go -d on_go"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - on-go-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: on-go-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - on-go-minio-data:/data

  redis:
    image: redis:7-alpine
    container_name: on-go-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: on-go-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/on-go-raw
      "

  ingest-api:
    build:
      context: ../..
      dockerfile: services/ingest-api/deploy/Dockerfile
    container_name: on-go-ingest-api
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      INGEST_APP_HOST: 0.0.0.0
      INGEST_APP_PORT: 8080
      INGEST_DATABASE_DSN: postgresql://on_go:on_go@postgres:5432/on_go
      INGEST_S3_ENDPOINT_URL: http://minio:9000
      INGEST_S3_REGION: us-east-1
      INGEST_S3_BUCKET: on-go-raw
      INGEST_S3_ACCESS_KEY_ID: minioadmin
      INGEST_S3_SECRET_ACCESS_KEY: minioadmin
      INGEST_S3_FORCE_PATH_STYLE: "true"
      INGEST_S3_PRESIGN_TTL_SECONDS: "900"
      INGEST_S3_PRESIGN_ENDPOINT_URL: ${INGEST_S3_PRESIGN_ENDPOINT_URL:-}
    ports:
      - "8080:8080"

  replay-service:
    build:
      context: ../..
      dockerfile: services/replay-service/deploy/Dockerfile
    container_name: on-go-replay-service
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      REPLAY_APP_HOST: 0.0.0.0
      REPLAY_APP_PORT: 8090
      REPLAY_APP_LOG_LEVEL: info
      REPLAY_DATABASE_DSN: postgresql://on_go:on_go@postgres:5432/on_go
      REPLAY_S3_ENDPOINT_URL: http://minio:9000
      REPLAY_S3_REGION: us-east-1
      REPLAY_S3_BUCKET: on-go-raw
      REPLAY_S3_ACCESS_KEY_ID: minioadmin
      REPLAY_S3_SECRET_ACCESS_KEY: minioadmin
      REPLAY_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "8090:8090"

  inference-api:
    build:
      context: ../..
      dockerfile: services/inference-api/deploy/Dockerfile
    container_name: on-go-inference-api
    environment:
      INFERENCE_APP_HOST: 0.0.0.0
      INFERENCE_APP_PORT: 8100
      INFERENCE_APP_LOG_LEVEL: info
      INFERENCE_MODEL_DIR: /models
    volumes:
      - ${ON_GO_MODEL_VOLUME:-on-go-models}:/models:ro
    ports:
      - "8100:8100"

  live-inference-api:
    build:
      context: ../..
      dockerfile: services/live-inference-api/deploy/Dockerfile
    container_name: on-go-live-inference-api
    environment:
      LIVE_INFERENCE_APP_HOST: 0.0.0.0
      LIVE_INFERENCE_APP_PORT: 8120
      LIVE_INFERENCE_APP_LOG_LEVEL: info
      LIVE_INFERENCE_MODEL_DIR: /models
      REPLAY_SERVICE_BASE_URL: http://replay-service:8090
    volumes:
      - ${ON_GO_MODEL_VOLUME:-on-go-models}:/models:ro
    ports:
      - "8120:8120"

  replay-infer-ui:
    image: nginx:alpine
    container_name: on-go-replay-infer-ui
    depends_on:
      - live-inference-api
    volumes:
      - ../../services/replay-infer-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../services/replay-infer-ui/public:/usr/share/nginx/html:ro
    ports:
      - "8121:80"

  personalization-worker:
    build:
      context: ../..
      dockerfile: services/personalization-worker/deploy/Dockerfile
    container_name: on-go-personalization-worker
    environment:
      PERSONALIZATION_APP_HOST: 0.0.0.0
      PERSONALIZATION_APP_PORT: 8110
      PERSONALIZATION_APP_LOG_LEVEL: info
    ports:
      - "8110:8110"

  signal-processing-worker:
    profiles:
      - batch
    build:
      context: ../..
      dockerfile: services/signal-processing-worker/deploy/Dockerfile
    container_name: on-go-signal-processing-worker
    command: ["sleep", "infinity"]
    environment:
      SPW_DATABASE_DSN: postgresql://on_go:on_go@postgres:5432/on_go
      SPW_S3_ENDPOINT_URL: http://minio:9000
      SPW_S3_REGION: us-east-1
      SPW_S3_RAW_BUCKET: on-go-raw
      SPW_S3_CLEAN_BUCKET: on-go-raw
      SPW_S3_ACCESS_KEY_ID: minioadmin
      SPW_S3_SECRET_ACCESS_KEY: minioadmin
      SPW_S3_FORCE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  on-go-postgres-data:
  on-go-minio-data:
  on-go-models:
