server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.kegazani.ru s3.kegazani.ru;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }
    location / {
        return 503;
    }
}
